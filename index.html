<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Codziennych Wyzwań</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Generator Codziennych Wyzwań!</h1>
        <h2>🎯 Naciśnij przycisk aby dostać swoje wyzwanie! 🥊</h2>
    </header>
    <main>
        <div class="pudelko">
            <button id="wylosujBtn">Wylosuj Wyzwanie!</button>
            <p id="wyzwanieText"></p>
            <button id="ukonczoneBtn" style="display: none;">Ukończone!</button>
            <button id="historiaBtn" style="display: none;">Pokaż historię</button>
            <ul id="historiaList" style="display: none;"></ul>
            <button id="resetHistoriaBtn" style="display: none;">Wyczyść historię</button>
        </div>
    </main>
    <footer>
        <div class="fleft">
            <img src="Spade_Transparent.png" alt="spade" style="height: 60px;">
            <p>©2026 Michał Pięta</p>
        </div>
        <div class="fcent">
            <a href="hallo"><img src="f.png" alt="facebook" style="height: 60px;"></a>
            <a href="hallo"><img src="t.png" alt="twitter" style="height: 60px;"></a>
            <p>Dołącz do Newslettera: </p>
            <input type="email" name="mail" id="mail" placeholder="E-Mail" style="width: 100px;">
            <button>Zapisz mnie!</button>
        </div>
        <div class="fright">
            <p><a href="hallo">Polityka Prywatności</a></p>
            <p><a href="hallo">Regulamin Strony</a></p>
            <p><a href="hallo">Kontakt</a></p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>

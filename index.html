<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Codziennych Wyzwań</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Generator Codziennych Wyzwań!</h1>
        <h2>🎯 Naciśnij przycisk aby dostać swoje wyzwanie! 🥊</h2>
    </header>
    <main>
        <div class="pudelko">
            <button id="wylosujBtn">Wylosuj Wyzwanie!</button>
            <p id="wyzwanieText"></p>
            <button id="ukonczoneBtn" style="display: none;">Ukończone!</button>
            <button id="historiaBtn" style="display: none;">Pokaż historię</button>
            <ul id="historiaList" style="display: none;"></ul>
            <button id="resetHistoriaBtn" style="display: none;">Wyczyść historię</button>
        </div>
    </main>
    <footer>
        <div class="ftop">
        <p>Strona stworzona przez: Michał Pięta</p>
        <img src="Spade_Transparent.png" alt="spade" style="height: 50px;">
        </div>
        <div class="fbot">
            <p><a href="hallo">Polityka Prywatności</a></p>
            <p><a href="hallo">Regulamin Strony</a></p>
            <p><a href="hallo">Kontakt</a></p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
